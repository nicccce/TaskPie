services:
  mysql:
    image: mysql:8.0
    container_name: taskpie-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-java_1_23}
      MYSQL_USER: ${MYSQL_USER:-java_1_23}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-JavaP123@}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-JavaP123@}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: taskpie-backend:local
    container_name: taskpie-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/java_1_23?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-java_1_23}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-JavaP123@}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      ATTACH_FOLDER: ${ATTACH_FOLDER:-/teach/java2/2025-1}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend-uploads:/teach/java2/2025-1
    restart: unless-stopped

volumes:
  mysql-data:
  backend-uploads:
